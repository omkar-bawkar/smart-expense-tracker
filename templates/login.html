<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #0b0b0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: #14141a;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
        }

        .back {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #aaa;
            text-decoration: none;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #1c1c24;
            border: none;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #4f46e5;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<a href="/" class="back">← Home</a>

<div class="card">
    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="username" required placeholder="Username">
        <input type="password" name="password" required placeholder="Password">

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
