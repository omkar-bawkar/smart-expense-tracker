<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body {
            background: #0b0b0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        .card {
            background: #14141a;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            border: 1px solid #222;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #1c1c24;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #ef4444;
            border: none;
            border-radius: 8px;
            color: white;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Admin Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Admin Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
