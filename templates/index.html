<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <style>
        body {
            background: #0b0b0f;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .admin-link {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 12px;
            color: #888;
            text-decoration: none;
        }

        .admin-link:hover {
            color: #ccc;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #14141a;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #222;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #4f46e5;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<a href="/admin-login" class="admin-link">Admin</a>

<div class="center">
    <div class="card">
        <h1>💸 Expense Tracker</h1>
        <p>Track. Control. Grow.</p>

        <a href="/login"><button>Login</button></a>
        <a href="/register"><button>Register</button></a>
    </div>
</div>

</body>
</html>
